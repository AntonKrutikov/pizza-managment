<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Shop — Backup Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      color: #D35400;
      font-size: 1.5rem;
      margin: 0 0 2rem;
      text-align: center;
    }

    .card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 1.5rem;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a1a;
      color: #f0f0f0;
      font-size: 0.9rem;
      font-family: monospace;
      margin-bottom: 1rem;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #D35400;
    }

    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      min-height: 44px;
    }

    .btn-primary {
      background: #D35400;
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover { background: #b84900; }
    .btn-primary:disabled { background: #666; cursor: not-allowed; }

    .btn-download {
      background: #2e7d32;
      color: #fff;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      min-height: 36px;
    }

    .btn-download:hover { background: #1b5e20; }

    .message {
      font-size: 0.9rem;
      padding: 0.5rem 0;
      min-height: 1.4em;
    }

    .message.error { color: #e57373; }
    .message.info  { color: #aaa; }
    .message.success { color: #81c784; }

    #results { width: 100%; max-width: 560px; }

    .backup-card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .backup-meta { flex: 1; }
    .backup-date { font-weight: 600; font-size: 0.95rem; }
    .backup-orders { font-size: 0.8rem; color: #aaa; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <h1>Pizza Shop — Backup Manager</h1>

  <main>
    <div class="card">
      <label for="uid-input">Your Firebase UID</label>
      <input type="text" id="uid-input" placeholder="Paste UID from the POS app…" autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="load-btn">Load Backups</button>
      <div class="message info" id="status-msg" aria-live="polite"></div>
    </div>

    <div id="results"></div>
  </main>

  <!-- Firebase compat SDK — loads window.firebase global required by js/firebase.js and js/backup-page.js -->
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore-compat.js"></script>
  <script type="module" src="js/backup-page.js"></script>
</body>
</html>
